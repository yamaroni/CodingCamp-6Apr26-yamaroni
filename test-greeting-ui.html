<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreetingUI Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    .test-result {
      margin: 10px 0;
      padding: 10px;
      border-radius: 4px;
    }
    .pass {
      background-color: #d4edda;
      color: #155724;
    }
    .fail {
      background-color: #f8d7da;
      color: #721c24;
    }
    h2 {
      margin-top: 30px;
    }
    #greeting-display {
      border: 1px solid #ccc;
      padding: 20px;
      margin: 20px 0;
      border-radius: 8px;
      background-color: #f9f9f9;
    }
    .greeting-text {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .time-text {
      font-size: 20px;
      margin-bottom: 5px;
    }
    .date-text {
      font-size: 16px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>GreetingUI Test</h1>
  <div id="test-results"></div>

  <h2>Live Greeting Display</h2>
  <div id="greeting-display"></div>

  <button id="stop-btn">Stop Updates</button>
  <button id="start-btn">Start Updates</button>
  <button id="manual-update-btn">Manual Update</button>

  <script src="js/app.js"></script>
  <script>
    const resultsDiv = document.getElementById('test-results');
    
    function addResult(testName, passed, message) {
      const div = document.createElement('div');
      div.className = `test-result ${passed ? 'pass' : 'fail'}`;
      div.textContent = `${passed ? '✓' : '✗'} ${testName}: ${message}`;
      resultsDiv.appendChild(div);
    }

    // Test GreetingUI
    const container = document.getElementById('greeting-display');
    const greetingManager = new GreetingManager();
    const greetingUI = new GreetingUI(container, greetingManager);

    // Test 1: Constructor initializes correctly
    addResult(
      'Constructor initializes',
      greetingUI.container === container && greetingUI.greetingManager === greetingManager,
      'Container and manager are set correctly'
    );

    // Test 2: update() renders content to DOM
    greetingUI.update();
    const hasGreeting = container.querySelector('.greeting-text') !== null;
    const hasTime = container.querySelector('.time-text') !== null;
    const hasDate = container.querySelector('.date-text') !== null;
    
    addResult(
      'update() renders to DOM',
      hasGreeting && hasTime && hasDate,
      `Greeting: ${hasGreeting}, Time: ${hasTime}, Date: ${hasDate}`
    );

    // Test 3: Rendered content matches manager output
    const greetingText = container.querySelector('.greeting-text').textContent;
    const timeText = container.querySelector('.time-text').textContent;
    const dateText = container.querySelector('.date-text').textContent;
    
    const expectedGreeting = greetingManager.getGreeting();
    const expectedTime = greetingManager.getCurrentTime();
    const expectedDate = greetingManager.getCurrentDate();
    
    addResult(
      'Rendered content matches manager',
      greetingText === expectedGreeting && timeText === expectedTime && dateText === expectedDate,
      `All values match`
    );

    // Test 4: start() begins automatic updates
    greetingUI.start();
    const hasInterval = greetingUI.intervalId !== null;
    addResult(
      'start() sets interval',
      hasInterval,
      `Interval ID: ${greetingUI.intervalId}`
    );

    // Test 5: stop() clears interval
    greetingUI.stop();
    const intervalCleared = greetingUI.intervalId === null;
    addResult(
      'stop() clears interval',
      intervalCleared,
      'Interval ID is null after stop'
    );

    // Test 6: Verify updates happen automatically
    let updateCount = 0;
    const initialTime = container.querySelector('.time-text').textContent;
    
    greetingUI.start();
    
    setTimeout(() => {
      const updatedTime = container.querySelector('.time-text').textContent;
      // Time might have changed or stayed the same depending on when test runs
      addResult(
        'Automatic updates working',
        true,
        `Initial: ${initialTime}, After 2s: ${updatedTime}`
      );
    }, 2000);

    // Wire up buttons
    document.getElementById('stop-btn').addEventListener('click', () => {
      greetingUI.stop();
      console.log('Updates stopped');
    });

    document.getElementById('start-btn').addEventListener('click', () => {
      greetingUI.start();
      console.log('Updates started');
    });

    document.getElementById('manual-update-btn').addEventListener('click', () => {
      greetingUI.update();
      console.log('Manual update triggered');
    });
  </script>
</body>
</html>
